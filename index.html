<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>𓃥 白六3D訊息雲霄飛車 (數據網址分享版)</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #141414;
            overscroll-behavior: none; 
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* 控制面板 */
        .ui-panel {
            position: absolute;
            top: 12px;
            left: 12px;
            z-index: 999;
            background: rgba(25, 25, 25, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            width: 300px;
            overflow: hidden;
            transition: max-height 0.25s ease-out;
            max-height: 95vh;
        }
        
        .ui-panel.collapsed {
            max-height: 54px; 
        }

        .panel-header {
            background: #222;
            padding: 10px 12px;
            cursor: move;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            gap: 6px;
            height: 54px;
        }

        .panel-title-text {
            font-size: 11px;
            font-weight: bold;
            color: #4dabf7;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            gap: 2px;
            flex: 1;
            overflow: hidden;
        }
        
        .title-main-lbl {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }

        .header-btn-group {
            display: flex;
            gap: 4px;
            align-items: center;
            flex-shrink: 0;
        }

        .toggle-collapse-btn {
            background: #444;
            color: #fff;
            border: none;
            padding: 6px 10px;
            font-size: 11px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold; 
            white-space: nowrap; 
            height: 32px;
            width: 58px; 
            text-align: center;
        }

        .header-drop-ball-btn {
            background: #228be6;
            color: #fff;
            border: none;
            padding: 6px 10px;
            font-size: 11px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            white-space: nowrap;
            height: 32px;
            box-shadow: 0 2px 6px rgba(34, 139, 230, 0.4);
        }

        .panel-content {
            padding: 12px 14px;
            max-height: calc(95vh - 54px);
            overflow-y: auto;
        }

        .control-mode-box {
            background: rgba(35, 35, 35, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 12px;
        }
        .mode-box-title {
            font-size: 11px;
            color: #aaa;
            margin-bottom: 6px;
            font-weight: bold;
        }
        .mode-btn-pair {
            display: flex;
            gap: 6px;
        }
        .mode-sub-btn {
            flex: 1;
            background: #333;
            color: #ccc;
            border: 1px solid #555;
            padding: 8px;
            font-size: 11px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        .mode-sub-btn.active {
            background: #e67e22;
            border-color: #e67e22;
            color: #fff;
            box-shadow: 0 0 6px rgba(230, 126, 34, 0.5);
        }

        .sim-settings-box {
            background: rgba(30, 30, 30, 0.85);
            border: 1px solid rgba(77, 171, 247, 0.3);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 12px;
        }
        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
            gap: 10px;
        }
        .setting-row:last-child { margin-bottom: 0; }
        .setting-label { font-size: 12px; color: #e0e0e0; font-weight: bold; }
        .custom-select {
            background: #2b2b2b;
            color: #fff;
            border: 1px solid #555;
            padding: 6px 8px;
            font-size: 12px;
            border-radius: 6px;
            outline: none;
            cursor: pointer;
            width: 130px;
        }
        
        .archive-list-box {
            margin-top: 6px;
            max-height: 110px;
            overflow-y: auto;
            border: 1px solid #444;
            border-radius: 4px;
            background: #111;
            padding: 4px;
        }
        .archive-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 6px;
            font-size: 11px;
            border-bottom: 1px solid #222;
            gap: 4px;
        }
        .archive-item:last-child { border-bottom: none; }
        .archive-btn-group {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }
        .archive-load-btn {
            background: #228be6;
            border: none;
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .archive-del-btn {
            background: #c92a2a;
            border: none;
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .control-slider-box {
            background: rgba(40, 40, 40, 0.95);
            border: 1px solid #4dabf7;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
        }
        .slider-title {
            font-size: 12px;
            color: #4dabf7;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .slider-container input[type=range] {
            flex: 1;
            accent-color: #228be6;
            height: 28px;
            cursor: pointer;
        }
        .slider-val {
            font-size: 12px;
            width: 55px;
            text-align: right;
            font-family: monospace;
            color: #ffcd00;
            font-weight: bold;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        button.menu-btn {
            background: #2b2b2b;
            color: #fff;
            border: 1px solid #555;
            padding: 12px;
            font-size: 13px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            font-weight: 500;
            width: 100%;
        }

        button.menu-btn:active { transform: scale(0.98); }
        button.menu-btn.primary { background: #228be6; border-color: #228be6; font-weight: bold; }
        button.menu-btn.success { background: #2b8a3e; border-color: #2b8a3e; font-weight: bold; }
        button.menu-btn.danger { background: #c92a2a; border-color: #c92a2a; font-weight: bold; }
        button.menu-btn.purple { background: #9c36b5; border-color: #9c36b5; font-weight: bold; color: #fff; }
        
        button.menu-btn.toggle-active {
            background: #e67e22;
            border-color: #e67e22;
            box-shadow: 0 0 8px rgba(230, 126, 34, 0.6);
            color: #fff;
            font-weight: bold;
        }
        
        button.menu-btn.recording-active {
            background: #e03131;
            border-color: #e03131;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0 { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        .hidden { display: none !important; }

        .instructions {
            font-size: 11px;
            color: #bbb;
            line-height: 1.5;
            margin: 0 0 10px 0;
            background: rgba(255,255,255,0.06);
            padding: 8px;
            border-radius: 6px;
        }

        .status-badge {
            display: inline-block;
            padding: 1px 4px;
            border-radius: 4px;
            font-size: 9px;
            font-weight: bold;
            background: #e67e22;
            color: white;
            white-space: nowrap;
        }
        .status-badge.simulate { background: #2ecc71; }

        .custom-text-box {
            background: rgba(35, 35, 35, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 12px;
        }
        .custom-text-input {
            width: 100%;
            background: #222;
            border: 1px solid #555;
            color: #fff;
            padding: 6px 8px;
            font-size: 12px;
            border-radius: 6px;
            outline: none;
            -webkit-user-select: text;
            user-select: text; 
        }

        #bottom-message-toast {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffcd00;
            font-weight: bold;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            text-align: center;
            pointer-events: none; 
            transition: opacity 0.3s, transform 0.3s;
            opacity: 0;
        }
        #bottom-message-toast.show { opacity: 1; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="bottom-message-toast">訊息列車已抵達終點！</div>

    <div class="ui-panel" id="movable-panel">
        <div class="panel-header" id="panel-drag-handle">
            <div class="panel-title-text">
                <div><span id="mode-badge" class="status-badge">佈置模式</span></div>
                <div class="title-main-lbl" id="panel-title">𓃥 白六3D訊息雲霄飛車</div>
            </div>
            
            <div class="header-btn-group">
                <button class="header-drop-ball-btn hidden" id="btn-drop-ball">發射</button>
                <button class="toggle-collapse-btn" id="btn-collapse">收合 [-]</button>
            </div>
        </div>
        
        <div class="panel-content">
            <div id="setup-instructions" class="instructions">
                <b>【3D 空間網址共享指南】</b><br>
                * 新增網址生成分享！接續軟管自動順應上一段走向，支援舊路徑刪除。
            </div>

            <div id="sim-instructions" class="instructions hidden">
                * <b>⚡ 預設開啟字串中心跟拍。可拉動下方字距滑桿隨時微調。</b>
            </div>

            <div class="custom-text-box setup-ctrl">
                <div class="mode-box-title">輸入管道內滑行文字：</div>
                <input type="text" id="input-toast-text" class="custom-text-input" value="早安星期一">
            </div>

            <div class="control-mode-box setup-ctrl" id="move-mode-section">
                <div class="mode-box-title">編輯模式設定：</div>
                <div class="mode-btn-pair">
                    <button id="btn-mode-single" class="mode-sub-btn active">移動單一節點</button>
                    <button id="btn-mode-all" class="mode-sub-btn">移動整組軟管</button>
                </div>
            </div>

            <div class="sim-settings-box setup-ctrl">
                <div class="mode-box-title" style="color: #4dabf7;">歷史路徑與外傳分享：</div>
                <div class="setting-row">
                    <span class="setting-label">儲存當前路徑：</span>
                    <button id="btn-save-archive" class="mode-sub-btn" style="flex:none; width:130px; padding:4px; background:#2b8a3e; border-color:#2b8a3e; color:#fff;">儲存存檔</button>
                </div>
                <div class="archive-list-box" id="archive-list-container"></div>
                
                <button id="btn-share-url" class="menu-btn purple" style="padding: 10px; font-size: 12px; margin-top: 8px; border-radius: 8px;">🔗 打包路徑+設定：生成分享網址</button>
                <button id="btn-clear-for-new" class="menu-btn danger" style="padding: 6px; font-size: 11px; margin-top: 6px; border-radius: 6px; font-weight: bold; background: #c92a2a;">✨ 徹底清空，建立全新軌道</button>
            </div>

            <div class="sim-settings-box sim-ctrl hidden" id="sim-custom-settings">
                <div class="setting-row">
                    <span class="setting-label">軟管可見度：</span>
                    <button id="btn-toggle-tube-visible" class="mode-sub-btn active" style="flex:none; width:130px; padding:6px;">顯示軟管</button>
                </div>
                <div class="setting-row">
                    <span class="setting-label">列車軌跡路徑色彩：</span>
                    <select id="select-trail-color" class="custom-select">
                        <option value="none" selected>透明 (預設)</option>
                        <option value="green">螢光綠 (Neon Green)</option>
                        <option value="blue">螢光藍 (Neon Blue)</option>
                        <option value="pink">螢光粉紅 (Neon Pink)</option>
                        <option value="yellow">炫目金黃 (Neon Yellow)</option>
                    </select>
                </div>
            </div>

            <div class="control-slider-box">
                <div class="slider-title" style="color: #ffcd00;">微調文字列車字距 (防重疊)：</div>
                <div class="slider-container">
                    <input type="range" id="slider-char-spacing" min="0.005" max="0.045" step="0.001" value="0.016">
                    <span class="slider-val" id="val-char-spacing">0.016</span>
                </div>
            </div>

            <div id="slider-box" class="control-slider-box setup-ctrl">
                <div class="slider-title">調整當前軟管段落總長度：</div>
                <div class="slider-container">
                    <input type="range" id="slider-tube-length" min="3.0" max="30.0" step="0.2" value="12.0">
                    <span class="slider-val" id="val-tube-length">12.0m</span>
                </div>
            </div>

            <div class="btn-group">
                <button id="btn-toggle-record" class="menu-btn danger sim-ctrl hidden">🎥 啟動模擬錄影</button>
                <button id="btn-follow-ball" class="menu-btn sim-ctrl hidden">鏡頭跟拍火車：開啟</button>
                <button id="btn-rearrange" class="menu-btn sim-ctrl hidden">再佈置 (返回調整)</button>

                <button id="btn-reset-view" class="menu-btn">一鍵恢復起始視角</button>
                <button id="btn-add-segment" class="menu-btn primary setup-ctrl">接續下一段軟管</button>
                <button id="btn-complete" class="menu-btn success setup-ctrl">完成佈置</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/TransformControls.js"></script>

    <script>
        const clock = new THREE.Clock();

        let scene, camera, renderer, orbitControls, transformControls;
        const container = document.getElementById('canvas-container');
        
        let controlPoints = [];      
        let tubeMesh = null;         
        let tubeLineCurve = null;    
        let editGuideLineMesh = null; 

        let currentAngleOffsetOffset = 0; 

        let trainCars = [];          
        let ballProgress = 0;        
        let ballVelocity = 0;        
        let isSimulating = false;    
        let isFollowingBall = true;  
        let currentMode = 'setup';   
        
        let pipeEditMode = 'single'; 

        let tubeVisibleState = true;   
        let selectedTrailColor = 'none'; 
        let trailMesh = null;          

        let mediaRecorder = null;
        let recordedChunks = [];
        let isRecording = false;

        let globalCharSpacing = 0.016; 

        const initCamX = 0, initCamY = 14, initCamZ = 24;
        const initTarX = 0, initTarY = 3, initTarZ = 0;

        let raycaster = new THREE.Raycaster();
        let mouse = new THREE.Vector2();

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a1a);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(initCamX, initCamY, initCamZ);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, preserveDrawingBuffer: true }); 
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            
            container.innerHTML = '';
            container.appendChild(renderer.domElement);

            renderer.domElement.addEventListener("webglcontextlost", function(event) {
                event.preventDefault();
                setTimeout(() => { init(); }, 100);
            }, false);

            window.addEventListener('contextmenu', e => e.preventDefault(), false);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.85);
            scene.add(ambientLight);

            const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight1.position.set(20, 40, 20);
            dirLight1.castShadow = true;
            scene.add(dirLight1);

            const dirLight2 = new THREE.DirectionalLight(0x4dabf7, 0.5);
            dirLight2.position.set(-20, 20, -20);
            scene.add(dirLight2);

            const floorGeo = new THREE.PlaneGeometry(60, 60);
            const floorMat = new THREE.MeshStandardMaterial({
                color: 0x555555,
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.4,
                roughness: 0.5,
                emissive: 0x111111
            });
            const floorMesh = new THREE.Mesh(floorGeo, floorMat);
            floorMesh.rotation.x = -Math.PI / 2;
            floorMesh.position.y = 0;
            floorMesh.receiveShadow = true;
            scene.add(floorMesh);

            const gridHelper = new THREE.GridHelper(60, 30, 0x999999, 0x444444);
            gridHelper.position.y = 0.01;
            scene.add(gridHelper);

            orbitControls = new THREE.OrbitControls(camera, renderer.domElement);
            orbitControls.enableDamping = true;
            orbitControls.dampingFactor = 0.1;
            orbitControls.screenSpacePanning = true; 
            orbitControls.target.set(initTarX, initTarY, initTarZ);
            orbitControls.update();

            transformControls = new THREE.TransformControls(camera, renderer.domElement);
            transformControls.setSize(0.75); 
            scene.add(transformControls);

            transformControls.addEventListener('change', () => {
                if (transformControls.object) {
                    handleNodeDragged(); 
                }
            });
            transformControls.addEventListener('dragging-changed', (event) => {
                orbitControls.enabled = !event.value; 
            });

            // 優先從網址 URL 解析分享數據，其次才是讀取本機 localStorage 快取
            if (!tryLoadFromUrlQuery()) {
                const archives = JSON.parse(localStorage.getItem('tube_archives') || '[]');
                if (archives.length > 0) {
                    const lastSavedArchive = archives[archives.length - 1];
                    loadPathArchivePoints(lastSavedArchive);
                } else {
                    initFirstTubePoints();
                }
            }

            renderer.domElement.removeEventListener('pointerdown', onPointerDown);
            renderer.domElement.addEventListener('pointerdown', onPointerDown, false);

            window.addEventListener('resize', onWindowResize, false);
            setupUIEvents();
            makePanelMovable(); 
            renderArchivesList(); 

            const dummyGeo = new THREE.BoxGeometry(0.1, 0.1, 0.1);
            const dummyMat = new THREE.MeshBasicMaterial({ transparent: true, opacity: 0.01 });
            const dummyMesh = new THREE.Mesh(dummyGeo, dummyMat);
            scene.add(dummyMesh);
            renderer.compile(scene, camera);
            scene.remove(dummyMesh);

            updateTube();

            setTimeout(forceViewReset, 100);
            setTimeout(forceViewReset, 300);
        }

        // 新增功能：從網址解碼分享設定
        function tryLoadFromUrlQuery() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const dataParam = urlParams.get('data');
                if (!dataParam) return false;

                const decodedData = JSON.parse(atob(dataParam));
                if (!decodedData || !decodedData.points) return false;

                // 還原路徑點
                controlPoints.forEach(p => {
                    if(transformControls.object === p) transformControls.detach();
                    scene.remove(p);
                });
                controlPoints = [];
                decodedData.points.forEach((pt, index) => {
                    const label = index === 0 ? "起始點" : (index === decodedData.points.length - 1 ? "終點" : `節點${index}`);
                    const p = createControlPoint(new THREE.Vector3(pt.x, pt.y, pt.z), label);
                    controlPoints.push(p);
                });

                // 還原相關參數
                if (decodedData.text) document.getElementById('input-toast-text').value = decodedData.text;
                if (decodedData.spacing) {
                    globalCharSpacing = parseFloat(decodedData.spacing);
                    document.getElementById('slider-char-spacing').value = globalCharSpacing;
                    document.getElementById('val-char-spacing').innerText = globalCharSpacing.toFixed(3);
                }

                currentAngleOffsetOffset = 0;
                if (controlPoints.length >= 3) {
                    const p1 = controlPoints[0], p2 = controlPoints[1], p3 = controlPoints[2];
                    const midPoint13 = new THREE.Vector3().addVectors(p1.position, p3.position).multiplyScalar(0.5);
                    currentAngleOffsetOffset = p2.position.distanceTo(midPoint13);
                }

                showCenterToast("📬 成功還原外傳分享的 3D 訊息軌道！");
                return true;
            } catch (e) {
                console.error("網址數據解碼出錯：", e);
                return false;
            }
        }

        function forceViewReset() {
            updateTube();
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            orbitControls.target.set(initTarX, initTarY, initTarZ);
            orbitControls.update();
            renderer.render(scene, camera);
        }

        function initFirstTubePoints() {
            controlPoints.forEach(p => {
                if(transformControls.object === p) transformControls.detach();
                scene.remove(p);
            });
            
            const p1 = createControlPoint(new THREE.Vector3(-6, 8.0, 0), "起始點");
            const p2 = createControlPoint(new THREE.Vector3(0, 6.5, 0), "第二點"); 
            const p3 = createControlPoint(new THREE.Vector3(6, 5.0, 0), "第三點");

            controlPoints = [p1, p2, p3];
            currentAngleOffsetOffset = 0; 
            
            const initialLen = p1.position.distanceTo(p3.position);
            document.getElementById('slider-tube-length').value = initialLen.toFixed(1);
            document.getElementById('val-tube-length').innerText = initialLen.toFixed(1) + "m";

            updateTube();
            setPipeEditMode('single');
        }

        function loadPathArchivePoints(targetArchive) {
            controlPoints.forEach(p => {
                if(transformControls.object === p) transformControls.detach();
                scene.remove(p);
            });
            
            controlPoints = [];
            targetArchive.points.forEach((pt, index) => {
                const label = index === 0 ? "起始點" : (index === targetArchive.points.length - 1 ? "終點" : `節點${index}`);
                const p = createControlPoint(new THREE.Vector3(pt.x, pt.y, pt.z), label);
                controlPoints.push(p);
            });
            
            currentAngleOffsetOffset = 0; 
            if (controlPoints.length >= 3) {
                const p1 = controlPoints[0];
                const p2 = controlPoints[1];
                const p3 = controlPoints[2];
                const midPoint13 = new THREE.Vector3().addVectors(p1.position, p3.position).multiplyScalar(0.5);
                currentAngleOffsetOffset = p2.position.distanceTo(midPoint13);
                
                const currentLen = p1.position.distanceTo(p3.position);
                document.getElementById('slider-tube-length').value = currentLen.toFixed(1);
                document.getElementById('val-tube-length').innerText = currentLen.toFixed(1) + "m";
            }

            updateTube();
            setPipeEditMode('single');
        }

        function createControlPoint(position, name) {
            const geometry = new THREE.SphereGeometry(0.48, 32, 32);
            const material = new THREE.MeshStandardMaterial({
                color: 0xff2222, 
                roughness: 0.15,
                metalness: 0.2,
                emissive: 0x220000
            });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.copy(position);
            mesh.castShadow = true;
            mesh.name = name;
            scene.add(mesh);
            return mesh;
        }

        function handleNodeDragged() {
            const targetObj = transformControls.object;
            if (!targetObj) return;

            const p1 = controlPoints[0]; 
            const p2 = controlPoints[1]; 
            const p3 = controlPoints[2]; 

            if (pipeEditMode === 'all') {
                if (!p1.lastPosition) {
                    p1.lastPosition = p1.position.clone();
                }
                const deltaMove = new THREE.Vector3().subVectors(p1.position, p1.lastPosition);
                for (let i = 1; i < controlPoints.length; i++) {
                    controlPoints[i].position.add(deltaMove);
                }
                p1.lastPosition.copy(p1.position);
            } 
            else {
                if (targetObj === p1) {
                    if (!p1.lastPosition) {
                        p1.lastPosition = p1.position.clone();
                    }
                    const deltaMove = new THREE.Vector3().subVectors(p1.position, p1.lastPosition);
                    if(p2) p2.position.add(deltaMove);
                    if(p3) p3.position.add(deltaMove);
                    p1.lastPosition.copy(p1.position);

                } else if (targetObj === p2 && p2 && p3) {
                    const midPoint13 = new THREE.Vector3().addVectors(p1.position, p3.position).multiplyScalar(0.5);
                    currentAngleOffsetOffset = p2.position.distanceTo(midPoint13);

                } else if (targetObj === p3 && p3) {
                    const currentLen = p1.position.distanceTo(p3.position);
                    document.getElementById('slider-tube-length').value = currentLen.toFixed(1);
                    document.getElementById('val-tube-length').innerText = currentLen.toFixed(1) + "m";
                }
            }

            controlPoints.forEach(p => { if (p.position.y < 0.3) p.position.y = 0.3; });
            if (p1) p1.lastPosition = p1.position.clone();

            updateTube();
        }

        function setPipeEditMode(mode) {
            pipeEditMode = mode;
            const btnSingle = document.getElementById('btn-mode-single');
            const btnAll = document.getElementById('btn-mode-all');

            if (mode === 'all') {
                btnAll.classList.add('active');
                btnSingle.classList.remove('active');
                if (controlPoints.length > 0) {
                    transformControls.attach(controlPoints[0]);
                    controlPoints.forEach(p => p.material.color.setHex(0xff2222));
                    controlPoints[0].material.color.setHex(0xffcd00);
                }
            } else {
                btnSingle.classList.add('active');
                btnAll.classList.remove('active');
            }
        }

        function handleTubeLengthSlider(newLength) {
            if (controlPoints.length < 3) return;
            const p1 = controlPoints[0];
            const p2 = controlPoints[1];
            const p3 = controlPoints[2];

            const dir13 = new THREE.Vector3().subVectors(p3.position, p1.position).normalize();
            p3.position.copy(p1.position).add(dir13.clone().multiplyScalar(newLength));

            const newMidPoint = new THREE.Vector3().addVectors(p1.position, p3.position).multiplyScalar(0.5);
            const upVector = new THREE.Vector3(0, 1, 0).projectOnPlane(dir13).normalize();
            p2.position.copy(newMidPoint).add(upVector.multiplyScalar(currentAngleOffsetOffset));

            if (p2.position.y < 0.3) p2.position.y = 0.3;
            if (p3.position.y < 0.3) p3.position.y = 0.3;

            updateTube();
        }

        function updateTube() {
            if (controlPoints.length < 2) return;
            const points = controlPoints.map(mesh => mesh.position);

            tubeLineCurve = new THREE.CatmullRomCurve3(points);
            tubeLineCurve.curveType = 'centripetal'; 

            if (tubeMesh) scene.remove(tubeMesh);
            if (editGuideLineMesh) scene.remove(editGuideLineMesh);

            const tubeGeometry = new THREE.TubeGeometry(tubeLineCurve, 100, 0.45, 24, false);
            let tubeMaterial;

            if (currentMode === 'setup') {
                tubeMaterial = new THREE.MeshStandardMaterial({
                    color: 0xdddddd,
                    transparent: true,
                    opacity: 0.35,        
                    roughness: 0.2,
                    metalness: 0.1,
                    side: THREE.DoubleSide,
                    depthWrite: true
                });

                const linePoints = tubeLineCurve.getPoints(100);
                const lineGeo = new THREE.BufferGeometry().setFromPoints(linePoints);
                const lineMat = new THREE.LineBasicMaterial({
                    color: 0x00d2ff,   
                    linewidth: 4       
                });
                editGuideLineMesh = new THREE.Line(lineGeo, lineMat);
                scene.add(editGuideLineMesh);

            } else {
                tubeMaterial = new THREE.MeshPhysicalMaterial({
                    color: 0xffffff,
                    transparent: true,
                    opacity: 0.12,        
                    roughness: 0.01,
                    metalness: 0.02,
                    transmission: 0.99,   
                    ior: 1.25,            
                    side: THREE.DoubleSide,
                    depthWrite: false     
                });
            }

            tubeMesh = new THREE.Mesh(tubeGeometry, tubeMaterial);
            tubeMesh.receiveShadow = true;
            tubeMesh.visible = tubeVisibleState;
            scene.add(tubeMesh);
        }

        // 核心優化點：讓新軟管的延伸走向，自動順應上一段曲線尾端的方向（切線延伸）
        function addTubeSegment() {
            transformControls.detach(); 

            const len = controlPoints.length;
            const lastNode = controlPoints[len - 1];
            const lastPos = lastNode.position.clone();
            
            let extendDir = new THREE.Vector3(4, 0, 0); // 預設延伸方向
            
            if (tubeLineCurve) {
                // 從現有曲線的末端（progress = 1.0）實時提取前進切線向量
                extendDir = tubeLineCurve.getTangentAt(1.0).normalize().multiplyScalar(4);
            }

            // 依據前段走勢，流暢推移生成新的一組中間點與終點節點
            const newP2_pos = lastPos.clone().add(extendDir);
            const newP3_pos = lastPos.clone().add(extendDir.clone().multiplyScalar(2));

            controlPoints.forEach(p => p.material.color.setHex(0xff2222));

            const p2_new = createControlPoint(newP2_pos, `新增段落第二點`);
            const p3_new = createControlPoint(newP3_pos, `新增段落第三點`);

            controlPoints.push(p2_new, p3_new);
            currentAngleOffsetOffset = 0; 

            const p1_base = controlPoints[0];
            const newTotalLen = p1_base.position.distanceTo(p3_new.position);
            document.getElementById('slider-tube-length').value = newTotalLen.toFixed(1);
            document.getElementById('val-tube-length').innerText = newTotalLen.toFixed(1) + "m";

            updateTube();

            transformControls.attach(p3_new);
            p3_new.material.color.setHex(0xffcd00);
            
            setPipeEditMode('single');
        }

        function onPointerDown(event) {
            if (event.cancelable) event.preventDefault();

            const panel = document.getElementById('movable-panel');
            if (panel.contains(event.target)) return;

            if (!panel.classList.contains('collapsed')) {
                panel.classList.add('collapsed');
                document.getElementById('btn-collapse').innerText = "展開 [+]";
            }

            if (currentMode === 'simulate') return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(controlPoints);

            if (intersects.length > 0) {
                const clickedNode = intersects[0].object;
                
                if (pipeEditMode === 'all') {
                    transformControls.attach(controlPoints[0]);
                    controlPoints.forEach(p => p.material.color.setHex(0xff2222));
                    controlPoints[0].material.color.setHex(0xffcd00);
                } else {
                    transformControls.attach(clickedNode);
                    controlPoints.forEach(p => p.material.color.setHex(0xff2222));
                    clickedNode.material.color.setHex(0xffcd00);
                }
            }
        }

        function createTextTrain(fullTextString) {
            trainCars.forEach(car => scene.remove(car));
            trainCars = [];

            const charArray = fullTextString.split('');
            
            charArray.forEach((char, index) => {
                const canvas = document.createElement('canvas');
                canvas.width = 128;
                canvas.height = 128;
                const ctx = canvas.getContext('2d');

                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.font = 'bold 95px sans-serif';
                ctx.fillStyle = index === 0 ? '#ff3232' : '#ffcd00'; 
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                ctx.shadowColor = index === 0 ? '#ff0000' : '#ff8c00';
                ctx.shadowBlur = 10;
                ctx.fillText(char, canvas.width / 2, canvas.height / 2);

                const texture = new THREE.CanvasTexture(canvas);
                
                const faceMat = new THREE.MeshBasicMaterial({ 
                    map: texture, 
                    transparent: true,
                    alphaTest: 0.3,                  
                    side: THREE.DoubleSide,
                    depthWrite: true                 
                });

                const carGroup = new THREE.Group();

                const layersCount = 7;
                const layerStep = 0.022; 
                const totalDepth = (layersCount - 1) * layerStep;
                const startZ = -totalDepth / 2;

                for (let l = 0; l < layersCount; l++) {
                    const frontGeo = new THREE.PlaneGeometry(0.85, 0.85);
                    const layerMesh = new THREE.Mesh(frontGeo, faceMat);
                    layerMesh.position.z = startZ + (l * layerStep);
                    carGroup.add(layerMesh);
                }
                
                carGroup.carIndex = index;

                scene.add(carGroup);
                trainCars.push(carGroup);
            });

            ballProgress = 0;
            ballVelocity = 0;
            updateTrainPhysicsPositions();
        }

        function updateTrainPhysicsPositions() {
            if (trainCars.length === 0 || !tubeLineCurve) return;

            trainCars.forEach(car => {
                let headProgress = ballProgress;
                if (headProgress > 1) headProgress = 1;

                let currentCarProgress = headProgress - (car.carIndex * globalCharSpacing);
                
                if (currentCarProgress < 0) currentCarProgress = 0;
                if (currentCarProgress > 1) currentCarProgress = 1;

                const pathPosition = tubeLineCurve.getPointAt(currentCarProgress);
                car.position.copy(pathPosition);

                const tangent = tubeLineCurve.getTangentAt(currentCarProgress).normalize();
                
                let upVec = new THREE.Vector3(0, 1, 0);
                if (Math.abs(tangent.dot(upVec)) > 0.99) {
                    upVec.set(0, 0, 1); 
                }
                const binormal = new THREE.Vector3().crossVectors(tangent, upVec).normalize();
                const normal = new THREE.Vector3().crossVectors(binormal, tangent).normalize();

                const m = new THREE.Matrix4().makeBasis(binormal, normal, tangent);
                car.quaternion.setFromRotationMatrix(m);
                
                if (car.carIndex === 0) {
                    car.scale.set(1.15, 1.15, 1.15); 
                }
            });
        }

        function initPhysicsBall() {
            const currentMessage = document.getElementById('input-toast-text').value;
            createTextTrain(currentMessage);
            clearTrail(); 
            document.getElementById('bottom-message-toast').classList.remove('show');
        }

        function updateTrailGeometry() {
            if (selectedTrailColor === 'none' || trainCars.length === 0 || ballProgress <= 0.002) {
                clearTrail();
                return;
            }

            let headProgress = ballProgress > 1 ? 1 : ballProgress;
            
            const lastCarIndex = trainCars.length - 1;
            const lastCarProgress = headProgress - (lastCarIndex * globalCharSpacing);
            const trailEndProgress = lastCarProgress - (globalCharSpacing * 0.4);

            if (trailEndProgress <= 0.005) {
                clearTrail();
                return;
            }

            if (trailMesh) scene.remove(trailMesh);

            const segmentsCount = Math.max(2, Math.floor(trailEndProgress * 100));
            let trailPoints = [];
            for (let i = 0; i <= segmentsCount; i++) {
                const t = (i / segmentsCount) * trailEndProgress;
                trailPoints.push(tubeLineCurve.getPointAt(t));
            }

            const trailCurve = new THREE.CatmullRomCurve3(trailPoints);
            const trailGeo = new THREE.TubeGeometry(trailCurve, segmentsCount * 2, 0.35, 16, false);

            let colorHex = 0xffffff;
            if (selectedTrailColor === 'green') colorHex = 0x39ff14;
            if (selectedTrailColor === 'blue') colorHex = 0x00f0ff;
            if (selectedTrailColor === 'pink') colorHex = 0xff007f;
            if (selectedTrailColor === 'yellow') colorHex = 0xffea00;

            const trailMat = new THREE.MeshStandardMaterial({
                color: colorHex,
                emissive: colorHex,
                emissiveIntensity: 1.8, 
                transparent: true,
                opacity: 0.7,
                roughness: 0.2
            });

            trailMesh = new THREE.Mesh(trailGeo, trailMat);
            scene.add(trailMesh);
        }

        function clearTrail() {
            if (trailMesh) {
                scene.remove(trailMesh);
                trailMesh = null;
            }
        }

        function updateBallPhysics(deltaTime) {
            if (!isSimulating || !tubeLineCurve || trainCars.length === 0) return;
            if (deltaTime > 0.05) deltaTime = 0.05; 

            const tangent = tubeLineCurve.getTangentAt(Math.min(1, ballProgress)).normalize();
            const gravityY = -9.8;
            const acceleration = tangent.y * gravityY;

            const frictionObj = -ballVelocity * 0.03;
            const totalAcc = acceleration + frictionObj;

            ballVelocity += totalAcc * deltaTime;
            const tubeLength = tubeLineCurve.getLength();
            const deltaProgress = (ballVelocity * deltaTime) / tubeLength;
            
            ballProgress += deltaProgress;

            if (ballProgress >= 1) {
                ballProgress = 1;
                ballVelocity = 0;
                isSimulating = false;
                if (isFollowingBall) toggleFollowBall(false); 
                
                const toastText = document.getElementById('input-toast-text').value;
                const toastEl = document.getElementById('bottom-message-toast');
                toastEl.innerText = "🚂 文字列車「" + toastText + "」已安全到站停靠！";
                toastEl.classList.add('show');

                if (isRecording) {
                    stopRecordingCanvas();
                }
            } else if (ballProgress < 0) {
                ballProgress = 0;
                ballVelocity = 0;
            }

            updateTrainPhysicsPositions();
            updateTrailGeometry();

            if (isFollowingBall && trainCars.length > 0) {
                let validCarCount = 0;
                const centerSum = new THREE.Vector3(0, 0, 0);

                trainCars.forEach(car => {
                    centerSum.add(car.position);
                    validCarCount++;
                });

                if (validCarCount > 0) {
                    centerSum.divideScalar(validCarCount); 
                    orbitControls.target.copy(centerSum);  
                }
            }
        }

        function toggleFollowBall(forceState = null) {
            isFollowingBall = (forceState !== null) ? forceState : !isFollowingBall;
            const btn = document.getElementById('btn-follow-ball');
            
            if (isFollowingBall) {
                btn.innerText = "鏡頭跟拍火車：開啟";
                btn.classList.add('toggle-active');
            } else {
                btn.innerText = "鏡頭跟拍火車：關閉";
                btn.classList.remove('toggle-active');
                if (trainCars.length > 0) {
                    let centerSum = new THREE.Vector3(0, 0, 0);
                    trainCars.forEach(car => centerSum.add(car.position));
                    centerSum.divideScalar(trainCars.length);
                    orbitControls.target.copy(centerSum);
                }
            }
        }

        function saveCurrentPathArchive() {
            const pointsData = controlPoints.map(p => ({
                x: p.position.x,
                y: p.position.y,
                z: p.position.z
            }));
            
            let archives = JSON.parse(localStorage.getItem('tube_archives') || '[]');

        // 新增功能：刪除指定存檔
        window.deletePathArchive = function(id) {

        // 新增功能：打包網址＋路徑數據數據，一鍵傳遞給收訊者
        function generateAndCopyShareUrl() {
            try {
                const pointsData = controlPoints.map(p => ({
                    x: p.position.x,
                    y: p.position.y,
                    z: p.position.z
                }));

                const sharePayload = {
                    points: pointsData,
                    text: document.getElementById('input-toast-text').value,
                    spacing: globalCharSpacing
                };

                // 將數據壓縮編碼為 Base64 字串
                const jsonString = JSON.stringify(sharePayload);
                const b64Data = btoa(encodeURIComponent(jsonString).replace(/%([0-9A-F]{2})/g, (match, p1) => {
                    return String.fromCharCode('0x' + p1);
                }));

                // 拼裝出完整的 Web App 分享 URL 連結
                const shareUrl = window.location.origin + window.location.pathname + '?data=' + b64Data;

                // 實時自動複製到手機/電腦剪貼簿
                const dummyInput = document.createElement('input');
                document.body.appendChild(dummyInput);
                dummyInput.value = shareUrl;
                dummyInput.select();
                dummyInput.setSelectionRange(0, 99999);
                document.execCommand('copy');
                document.body.removeChild(dummyInput);

                showCenterToast("🔗 分享網址已自動複製！可直接傳給好友！");
            } catch (err) {
                console.error("生成分享網址出錯：", err);
                alert("生成網址失敗，請確認是否在網頁環境下執行。");
            }
        }

        function showCenterToast(msg) {
            const toastEl = document.getElementById('bottom-message-toast');
            toastEl.innerText = msg;
            toastEl.classList.add('show');
            setTimeout(() => toastEl.classList.remove('show'), 2500);
        }

        function startRecordingCanvas() {
            recordedChunks = [];
            const canvas = renderer.domElement;
            const stream = canvas.captureStream(30);
            
            let options = { mimeType: 'video/webm;codecs=vp9' };
            if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                options = { mimeType: 'video/webm;codecs=vp8' };
            }
            if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                options = { mimeType: 'video/webm' };
            }

            try {
                mediaRecorder = new MediaRecorder(stream, options);
            } catch (e) {
                mediaRecorder = new MediaRecorder(stream);
            }

            mediaRecorder.ondataavailable = function(e) {
                if (e.data && e.data.size > 0) {
                    recordedChunks.push(e.data);
                }
            };

            mediaRecorder.onstop = function() {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = `3D文字火車貼軌錄影_${Date.now()}.webm`;
                document.body.appendChild(a);
                a.click();
                
                setTimeout(() => {
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(url);
                }, 100);
            };

            mediaRecorder.start();
            isRecording = true;
            
            const btn = document.getElementById('btn-toggle-record');
            btn.innerText = "🛑 正在錄影中 (火車到站自動下載)";
            btn.classList.add('recording-active');
        }

        function stopRecordingCanvas() {
            if (!isRecording || !mediaRecorder) return;
            mediaRecorder.stop();
            isRecording = false;
            
            const btn = document.getElementById('btn-toggle-record');
            btn.innerText = "🎥 啟動模擬錄影";
            btn.classList.remove('recording-active');
        }

        function makePanelMovable() {
            const panel = document.getElementById('movable-panel');
            const handle = document.getElementById('panel-drag-handle');
            
            let isDragging = false;
            let startX, startY, initialLeft, initialTop;

            handle.addEventListener('mousedown', dragStart, false);
            handle.addEventListener('touchstart', dragStart, { passive: false });

            function dragStart(e) {
                if(e.target.id === 'btn-collapse' || e.target.id === 'btn-drop-ball' || e.target.id === 'btn-clear-for-new' || e.target.id === 'btn-share-url') return;
                
                isDragging = true;
                const clientX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
                const clientY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
                
                startX = clientX;
                startY = clientY;
                
                const rect = panel.getBoundingClientRect();
                initialLeft = rect.left;
                initialTop = rect.top;

                document.addEventListener('mousemove', dragMove, false);
                document.addEventListener('mouseup', dragEnd, false);
                document.addEventListener('touchmove', dragMove, { passive: false });
                document.addEventListener('touchend', dragEnd, false);
            }

            function dragMove(e) {
                if (!isDragging) return;
                if (e.cancelable) e.preventDefault();
                
                const clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
                const clientY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
                
                const dx = clientX - startX;
                const dy = clientY - startY;
                
                let newLeft = initialLeft + dx;
                let newTop = initialTop + dy;
                
                newLeft = Math.max(0, Math.min(newLeft, window.innerWidth - panel.offsetWidth));
                newTop = Math.max(0, Math.min(newTop, window.innerHeight - panel.offsetHeight));
                
                panel.style.left = newLeft + 'px';
                panel.style.top = newTop + 'px';
            }

            function dragEnd() {
                isDragging = false;
                document.removeEventListener('mousemove', dragMove);
                document.removeEventListener('mouseup', dragEnd);
                document.removeEventListener('touchmove', dragMove);
                document.removeEventListener('touchend', dragEnd);
            }
        }

        function setupUIEvents() {
            const panel = document.getElementById('movable-panel');
            const collapseBtn = document.getElementById('btn-collapse');
            
            collapseBtn.addEventListener('click', (e) => {
                e.preventDefault(); e.stopPropagation();
                panel.classList.toggle('collapsed');
                collapseBtn.innerText = panel.classList.contains('collapsed') ? "展開 [+]" : "收合 [-]";
            }, false);

            document.getElementById('btn-mode-single').addEventListener('click', (e) => {
                e.preventDefault(); e.stopPropagation();
                setPipeEditMode('single');
            }, false);

            document.getElementById('btn-mode-all').addEventListener('click', (e) => {
                e.preventDefault(); e.stopPropagation();
                setPipeEditMode('all');
            }, false);

            const toggleTubeBtn = document.getElementById('btn-toggle-tube-visible');
            toggleTubeBtn.addEventListener('click', (e) => {
                e.preventDefault(); e.stopPropagation();
                tubeVisibleState = !tubeVisibleState;
                if (tubeMesh) tubeMesh.visible = tubeVisibleState;
                
                if (tubeVisibleState) {
                    toggleTubeBtn.innerText = "顯示軟管";
                    toggleTubeBtn.classList.add('active');
                } else {
                    toggleTubeBtn.innerText = "隱藏軟管";
                    toggleTubeBtn.classList.remove('active');
                }
            }, false);

            const trailSelect = document.getElementById('select-trail-color');
            trailSelect.addEventListener('change', (e) => {
                selectedTrailColor = trailSelect.value;
                if (trainCars.length > 0 && isSimulating) {
                    updateTrailGeometry();
                } else {
                    clearTrail();
                }
            }, false);

            document.getElementById('btn-save-archive').addEventListener('click', (e) => {
                e.preventDefault(); e.stopPropagation();
                saveCurrentPathArchive();
            }, false);

            // 監聽：分享網址打包複製
            document.getElementById('btn-share-url').addEventListener('click', (e) => {
                e.preventDefault(); e.stopPropagation();
                generateAndCopyShareUrl();
            }, false);

            document.getElementById('btn-clear-for-new').addEventListener('click', (e) => {
                e.preventDefault(); e.stopPropagation();
                initFirstTubePoints(); 
                showCenterToast("✨ 歷史路徑已清空，全新起點軌道建立完畢！");
            }, false);

            document.getElementById('btn-toggle-record').addEventListener('click', (e) => {
                e.preventDefault(); e.stopPropagation();
                if (!isRecording) {
                    startRecordingCanvas();
                } else {
                    stopRecordingCanvas();
                }
            }, false);

            const spacingSlider = document.getElementById('slider-char-spacing');
            const spacingValText = document.getElementById('val-char-spacing');
            spacingSlider.addEventListener('input', (e) => {
                e.stopPropagation();
                globalCharSpacing = parseFloat(spacingSlider.value);
                spacingValText.innerText = globalCharSpacing.toFixed(3);
                updateTrainPhysicsPositions(); 
                updateTrailGeometry();
            }, false);

            const lengthSlider = document.getElementById('slider-tube-length');
            const lengthValText = document.getElementById('val-tube-length');
            
            const onSliderInput = (e) => {
                e.stopPropagation(); 
                const val = parseFloat(lengthSlider.value);
                lengthValText.innerText = val.toFixed(1) + "m";
                handleTubeLengthSlider(val);
            };
            lengthSlider.addEventListener('input', onSliderInput, false);
            lengthSlider.addEventListener('change', onSliderInput, false);

            document.getElementById('btn-reset-view').addEventListener('click', (e) => {
                e.preventDefault(); e.stopPropagation();
                if (isFollowingBall) toggleFollowBall(false); 
                orbitControls.reset();
                camera.position.set(initCamX, initCamY, initCamZ);
                orbitControls.target.set(initTarX, initTarY, initTarZ);
                orbitControls.update();
            }, false);

            document.getElementById('btn-add-segment').addEventListener('click', (e) => {
                e.preventDefault(); e.stopPropagation();
                addTubeSegment();
            }, false);

            document.getElementById('btn-complete').addEventListener('click', (e) => {
                e.preventDefault(); e.stopPropagation();
                transformControls.detach(); 
                currentMode = 'simulate';
                controlPoints.forEach(p => p.visible = false);

                document.getElementById('mode-badge').innerText = "滾球模式";
                document.getElementById('mode-badge').className = "status-badge simulate";
                
                document.getElementById('setup-instructions').classList.add('hidden');
                document.getElementById('sim-instructions').classList.remove('hidden');

                document.querySelectorAll('.setup-ctrl').forEach(el => el.classList.add('hidden'));
                document.querySelectorAll('.sim-ctrl').forEach(el => el.classList.remove('hidden'));

                document.getElementById('btn-drop-ball').classList.remove('hidden');

                tubeVisibleState = true;
                toggleTubeBtn.innerText = "顯示軟管";
                toggleTubeBtn.classList.add('active');
                
                isFollowingBall = true;
                const followBtn = document.getElementById('btn-follow-ball');
                followBtn.innerText = "鏡頭跟拍火車：開啟";
                followBtn.classList.add('toggle-active');

                updateTube();
                initPhysicsBall();
            }, false);

            document.getElementById('btn-drop-ball').addEventListener('click', (e) => {
                e.preventDefault(); e.stopPropagation();
                initPhysicsBall();
                isSimulating = true;
            }, false);

            document.getElementById('btn-follow-ball').addEventListener('click', (e) => {
                e.preventDefault(); e.stopPropagation();
                toggleFollowBall();
            }, false);

            document.getElementById('btn-rearrange').addEventListener('click', (e) => {
                e.preventDefault(); e.stopPropagation();
                currentMode = 'setup';
                isSimulating = false;
                toggleFollowBall(false);
                clearTrail();
                stopRecordingCanvas();
                
                trainCars.forEach(car => scene.remove(car));
                trainCars = [];

                tubeVisibleState = true;
                controlPoints.forEach(p => p.visible = true);
                
                document.getElementById('mode-badge').innerText = "佈置模式";
                document.getElementById('mode-badge').className = "status-badge";
                
                document.getElementById('setup-instructions').classList.remove('hidden');
                document.getElementById('sim-instructions').classList.add('hidden');

                document.querySelectorAll('.setup-ctrl').forEach(el => el.classList.remove('hidden'));
                document.querySelectorAll('.sim-ctrl').forEach(el => el.classList.add('hidden'));
                
                document.getElementById('btn-drop-ball').classList.add('hidden');
                document.getElementById('bottom-message-toast').classList.remove('show');
                
                updateTube();

                orbitControls.target.set(initTarX, initTarY, initTarZ);
                orbitControls.update();
                
                setPipeEditMode('single');
            }, false);

            panel.addEventListener('pointerdown', (e) => {
                e.stopPropagation();
            }, false);
            
            document.getElementById('input-toast-text').addEventListener('pointerdown', (e) => {
                e.stopPropagation();
            }, false);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const deltaTime = clock.getDelta();

            orbitControls.update();

            if (currentMode === 'simulate') {
                updateBallPhysics(deltaTime);
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
